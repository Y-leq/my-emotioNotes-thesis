# ============ EmotioNotes 毕设项目配置 ============

# 数据集路径配置
dataset:
  deam_annotations_dir: "./DEAM_Annotations/annotations"  # 静态/动态标注 CSV 目录
  deam_audio_dir: "./DEAM_audio"                          # 音频根目录（会递归搜索 mp3）
  deam_features_dir: "./features"
  
# 预处理配置（方案A：直接使用 DEAM 原生 45s 片段，不二次切分）
preprocessing:
  target_sr: 44100              # 目标采样率 (Hz)
  use_native_duration: true     # true=保留 45s 原长，不裁剪
  mono: true                    # 是否转为单声道
  trim_db: 30                   # 静音检测阈值（首尾轻量裁剪）
  
# 数据集划分配置
splitting:
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  random_seed: 42
  
# 音频→文本模型配置
audio_to_text:
  provider: "dashscope"
  model_name: "qwen2-audio-instruct"
  endpoint: "https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation"
  api_key: "sk-xxxx"
  temperature: 0.2
  max_tokens: 220
  clip_seconds: 30
  max_samples: 3  # 调试阶段先小样本，设为 null 则全量
  request_timeout: 180
  
# LLM配置
llm:
  provider: "aliyun"  # aliyun | gitcode | atomgit | openai
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # 通义千问 OpenAI 兼容接口
  model_name: "qwen-plus"  # 与 test.py 中保持一致
  api_key: "sk-xxxx"  # 建议使用环境变量 ALIYUN_API_KEY 覆盖
  temperature: 0.7
  max_tokens: 200
  
# 质量评估配置
quality_assessment:
  auto_min_length: 50
  manual_sample_rate: 0.1  # 10%抽检
  manual_score_threshold: 3.0  # 满分5分
  
# 输出路径配置
output:
  processed_audio_dir: "./data/processed_audio"
  descriptions_dir: "./data/descriptions"
  emotions_dir: "./data/emotions"
  features_dir: "./data/features"
  splits_dir: "./data/splits"
  results_dir: "./results"
  
# 日志配置
logging:
  level: "INFO"
  log_file: "./logs/experiment.log"